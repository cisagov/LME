---
- name: Setup LME
  hosts: "{{ target_hosts | default('localhost') }}"
  connection: "{{ ansible_connection | default('local') }}"
  become: yes
  vars:
    # Common variables
    clone_directory: "{{ clone_dir | default(playbook_dir + '/..') }}"
    install_user: "{{ ansible_user_id }}"
    debug_mode: false  # Default debug mode to false
    offline_mode: false  # Default offline mode to false

    # Storage configuration
    storage_runroot: "/run/containers/storage"
    storage_graphroot: "/var/lib/containers/storage"
    
    # Directory configuration
    config_dir: "/etc/lme"
    user_config_dir: "/root/.config/containers"
    user_vault_dir: "/etc/lme/vault"
    user_secrets_conf: "/root/.config/containers/containers.conf"
    user_storage_conf: "/root/.config/containers/storage.conf"
    global_storage_conf: "/etc/containers/storage.conf"
    password_file: "/etc/lme/pass.sh"
    
    # Password configuration
    min_length: 12
    
    # Elasticsearch configuration
    es_port: 9200
    kibana_port: 5601
    fleet_port: 8220
    
    # Cluster mode configuration (default: false for single-node deployment)
    # Set to true when deploying a multi-node Elasticsearch cluster
    # Can be enabled via: -e lme_cluster_mode=true
    lme_cluster_mode: false
    
    # Elasticsearch replicas: 0 for single-node (default), 1+ for cluster
    elasticsearch_number_of_replicas: "{{ 1 if lme_cluster_mode | default(false) else 0 }}"
    
    # Cluster discovery settings (only used when lme_cluster_mode=true)
    # es_discovery_type: 'single-node' for standalone, 'cluster' for multi-node
    es_discovery_type: "{{ 'cluster' if lme_cluster_mode | default(false) else 'single-node' }}"
    
    # Seed hosts for cluster discovery (used when lme_cluster_mode=true)
    # Should include all nodes that will be part of the cluster
    es_seed_hosts: "{{ es_cluster_seed_hosts | default([]) }}"
    
    # Initial master nodes for cluster bootstrap (used when lme_cluster_mode=true)
    # Only needed for first-time cluster setup
    es_initial_masters: "{{ es_initial_master_nodes | default(['lme-elasticsearch']) }}"
    
    # Whether this is the initial master node (sets cluster.initial_master_nodes)
    es_is_initial_master: "{{ lme_cluster_mode | default(false) }}"
    
    # Network publish host for cluster mode - the address other nodes can reach this node at
    # For cluster mode, should be set to the external hostname/IP of this node
    # Can be set via: -e es_publish_host=node1
    es_publish_host: "{{ es_master_publish_host | default(omit) }}"
    
    # Kibana version
    kibana_version: "8.18.8"
    
    # Default timezone settings
    timezone_area: "Etc"  # Change to your area: America, Europe, Asia, etc.
    timezone_zone: "UTC"  # Change to your timezone: New_York, London, Tokyo, etc.
    nix_profile_symlink_path: /nix/var/nix/profiles/default
  roles:
    - role: base
      tags: ['base', 'all']
    - role: nix
      tags: ['base', 'system', 'all']
    - role: podman
      tags: ['system', 'all']
    - role: elasticsearch
      tags: ['system', 'all']
    - role: kibana
      tags: ['system', 'all']
    - role: dashboards
      tags: ['system', 'all']
    - role: wazuh
      tags: ['system', 'all']
    - role: fleet
      tags: ['system', 'all']
    - role: cleanup
      tags: ['cleanup', 'all']
    