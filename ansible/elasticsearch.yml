---
- name: Deploy Elasticsearch
  hosts: elasticsearch
  become: yes
  vars:
    # Common variables (same as site.yml)
    clone_directory: "{{ clone_dir | default(playbook_dir + '/..') }}"
    install_user: "{{ ansible_user_id }}"
    debug_mode: false
    offline_mode: false

    # Storage configuration
    storage_runroot: "/run/containers/storage"
    storage_graphroot: "/var/lib/containers/storage"
    
    # Directory configuration
    config_dir: "/etc/lme"
    user_config_dir: "/root/.config/containers"
    user_vault_dir: "/etc/lme/vault"
    user_secrets_conf: "/root/.config/containers/containers.conf"
    user_storage_conf: "/root/.config/containers/storage.conf"
    global_storage_conf: "/etc/containers/storage.conf"
    password_file: "/etc/lme/pass.sh"
    
    # Password configuration
    min_length: 12
    
    # Elasticsearch configuration
    es_port: 9200
    elasticsearch_number_of_replicas: 0
    
    # Nix configuration
    nix_profile_symlink_path: /nix/var/nix/profiles/default

    # Prevent podman role from starting the full stack automatically.
    # We explicitly start the Elasticsearch unit after certs/secrets distribution.
    lme_autostart: false

  roles:
    - role: base
      tags: ['base']
    - role: nix
      tags: ['system']
    - role: podman
      tags: ['system']
    - role: secrets_distribution
      tags: ['secrets']
    - role: certs
      tags: ['certs']

  tasks:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start Elasticsearch unit
      ansible.builtin.systemd:
        name: lme-elasticsearch
        state: started
        enabled: true

    - name: Run Elasticsearch post-install configuration
      ansible.builtin.include_role:
        name: elasticsearch
      tags: ['elasticsearch']
