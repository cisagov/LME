---
# Absorbs the former extract_caldera_secrets role. Extracts Caldera IP, API key,
# and user credentials, then delegates them as facts on localhost so downstream
# roles (ludus_caldera_agent, ludus_caldera_scripts) can consume them.

- name: Get Caldera server IP
  ansible.builtin.shell: ip addr show | grep -oP '(?<=inet\s)10\.\S+' | cut -d'/' -f1 | head -n1
  register: caldera_ip_result
  changed_when: false

- name: Get Caldera API key (red team)
  ansible.builtin.shell: grep "api_key_red" {{ ludus_caldera_server_install_dir }}/conf/default.yml | awk '{print $2}'
  register: caldera_api_key_result
  changed_when: false

- name: Get Caldera user credentials
  ansible.builtin.shell: grep -A 4 "users:" {{ ludus_caldera_server_install_dir }}/conf/default.yml
  register: caldera_users_result
  changed_when: false

- name: Set Caldera facts on localhost for downstream roles
  ansible.builtin.set_fact:
    caldera_ip: "{{ caldera_ip_result.stdout }}"
    caldera_api_key: "{{ caldera_api_key_result.stdout }}"
    caldera_passwords: "{{ caldera_users_result.stdout }}"
  delegate_to: localhost
  delegate_facts: true

- name: Display Caldera deployment summary
  ansible.builtin.debug:
    msg: |
      Caldera {{ ludus_caldera_server_version }} deployed.
        URL:     http://{{ caldera_ip_result.stdout }}:{{ ludus_caldera_server_port }}
        API Key: {{ caldera_api_key_result.stdout }}
