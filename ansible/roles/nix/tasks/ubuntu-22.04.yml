---
# Ubuntu 22.04: Install Nix via official installer (apt version is too old)

- name: Check if Nix is already installed
  stat:
    path: /nix/var/nix/profiles/default/bin/nix
  register: nix_installed

- name: Create nix installation directory
  file:
    path: /opt/nix-install
    state: directory
    mode: '0755'
  become: yes
  when: not nix_installed.stat.exists

- name: Create temporary directory for Nix install
  file:
    path: /opt/nix-install/tmp
    state: directory
    mode: '0755'
  become: yes
  when: not nix_installed.stat.exists

- name: Check for offline Nix installer
  stat:
    path: "{{ clone_directory }}/offline_resources/nix/install-nix.sh"
  register: offline_nix_installer
  when: offline_mode | default(false)

- name: Copy offline Nix installer
  copy:
    src: "{{ clone_directory }}/offline_resources/nix/install-nix.sh"
    dest: /opt/nix-install/install-nix.sh
    mode: '0755'
  become: yes
  when:
    - offline_mode | default(false)
    - not nix_installed.stat.exists
    - offline_nix_installer.stat.exists

- name: Download Nix installer (online mode)
  get_url:
    url: https://nixos.org/nix/install
    dest: /opt/nix-install/install-nix.sh
    mode: '0755'
  become: yes
  when:
    - not (offline_mode | default(false))
    - not nix_installed.stat.exists

- name: Install Nix package manager
  shell: sh /opt/nix-install/install-nix.sh --daemon --yes
  become: yes
  environment:
    TMPDIR: /opt/nix-install/tmp
  when: not nix_installed.stat.exists

- name: Ensure nix-daemon service is started
  systemd:
    name: nix-daemon
    state: started
    enabled: yes
  become: yes

- name: Ensure nix-users group exists
  group:
    name: nix-users
    state: present
  become: yes

- name: Add user to nix-users group
  user:
    name: "{{ install_user }}"
    groups: nix-users
    append: yes
  become: yes

- name: Add Nix channel (online mode)
  command: nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
  become: yes
  environment:
    PATH: "{{ ansible_env.PATH }}:/nix/var/nix/profiles/default/bin"
  when: not (offline_mode | default(false))

- name: Update Nix channel (online mode)
  command: nix-channel --update
  become: yes
  environment:
    PATH: "{{ ansible_env.PATH }}:/nix/var/nix/profiles/default/bin"
  when: not (offline_mode | default(false))

- name: Install required packages (online mode)
  command: nix-env -iA nixpkgs.podman nixpkgs.docker-compose
  become: yes
  environment:
    PATH: "{{ ansible_env.PATH }}:/nix/var/nix/profiles/default/bin"
  when: not (offline_mode | default(false))

- name: Check for offline Nix packages
  stat:
    path: "{{ clone_directory }}/offline_resources/packages/nix/podman-closure.nar"
  register: offline_nix_packages
  when: offline_mode | default(false)

- name: Import Nix packages from offline archive
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    nix-store --import < "{{ clone_directory }}/offline_resources/packages/nix/podman-closure.nar"
  become: yes
  when:
    - offline_mode | default(false)
    - offline_nix_packages.stat.exists

- name: Install podman from offline store path
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    PODMAN_STORE_PATH=$(cat "{{ clone_directory }}/offline_resources/packages/nix/podman-store-path.txt")
    nix-env -i "$PODMAN_STORE_PATH"
  become: yes
  when:
    - offline_mode | default(false)
    - offline_nix_packages.stat.exists

- name: Display offline mode message for Nix packages
  debug:
    msg: "Offline mode enabled - skipping Nix channel operations and package installations. Ensure Nix packages are available from offline resources."
  when: offline_mode | default(false)


