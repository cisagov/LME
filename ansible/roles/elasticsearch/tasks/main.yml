---
# Elasticsearch setup tasks

- name: Debug - Show what global_secrets contains
  debug:
    msg: "global_secrets variable: {{ global_secrets | default('UNDEFINED') }}"

- name: Set playbook variables
  ansible.builtin.set_fact:
    local_es_url: "{{ env_dict.LOCAL_ES_URL | default('') }}"
    elastic_username: "{{ env_dict.ELASTIC_USERNAME | default('') }}"
    elastic_password: "{{ global_secrets.elastic | default('') }}"

- name: Debug - Show extracted values
  debug:
    msg: "Elasticsearch config - URL: {{ local_es_url }}, Username: {{ elastic_username }}, Password length: {{ elastic_password | length }}"

# Create Read-Only User
- name: Wait for Elasticsearch to be ready
  uri:
    url: "{{ local_es_url }}"
    method: GET
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: 200
  register: result
  until: result.status is defined and result.status == 200
  retries: 60
  delay: 10
  ignore_errors: yes

- name: Check if Elasticsearch is ready
  fail:
    msg: "Elasticsearch is not ready after 10 minutes. Please check the LME service and Elasticsearch logs."
  when: result.status is not defined or result.status != 200

- name: Create readonly role using uri module
  uri:
    url: "{{ local_es_url }}/_security/role/readonly_role"
    method: POST
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      indices:
        - names: ["*"]
          privileges: ["read", "view_index_metadata"]
      cluster: ["monitor"]
      applications:
        - application: "kibana-.kibana"
          privileges: 
            - "feature_discover.read"
            - "feature_visualize.read"
            - "feature_dashboard.read"
            - "feature_canvas.read"
            - "feature_maps.read"
            - "feature_logs.read"
            - "feature_infrastructure.read"
            - "feature_apm.read"
            - "feature_metrics.read"
            - "feature_uptime.read"
          resources: ["*"]
    status_code: [200, 201]
  register: role_creation_result
  when: result.status is defined and result.status == 200

- name: Generate random password for readonly user
  shell: |
    source /root/.profile 
    password=$(</dev/urandom tr -dc A-Za-z0-9$@! | head -c30)
    echo -n $password
  register: read_only_password
  become: yes
  args:
    executable: /bin/bash
  ignore_errors: true

- name: Set readonly password as fact for other roles
  set_fact:
    readonly_user_password: "{{ read_only_password.stdout }}"
  when: read_only_password.stdout is defined

- name: Create readonly user using uri module
  uri:
    url: "{{ local_es_url }}/_security/user/readonly_user"
    method: POST
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      password: "{{ read_only_password.stdout }}"
      roles: ["readonly_role"]
      full_name: "Read Only User"
    status_code: [200, 201]
  register: user_creation_result
  when: result.status is defined and result.status == 200

# Password display moved to cleanup role to show at the end

# Change elastic user password
- name: Change elastic user password
  shell: 'curl -X POST -kL --user "{{ elastic_username }}":"{{ elastic_password }}" -H "Content-Type: application/json" -d "{\"password\":\"{{ elastic_password }}\"}" "https://127.0.0.1:9200/_security/user/elastic/_password"'
  no_log: "{{ not debug_mode }}"
  become: yes

# Set default index template for single-node cluster replica settings (non-data-stream indices)
- name: Set default index template for replica settings
  uri:
    url: "{{ local_es_url }}/_index_template/lme_single_node_replica_template"
    method: PUT
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      index_patterns: ["*"]
      priority: 10000
      template:
        settings:
          index:
            number_of_replicas: 0
    status_code: [200, 201]
  register: template_result
  when: result.status is defined and result.status == 200
  no_log: "{{ not debug_mode }}"
  ignore_errors: yes

# Set data stream template specifically for data streams
- name: Set data stream template for replica settings
  uri:
    url: "{{ local_es_url }}/_index_template/lme_datastream_replica_template"
    method: PUT
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      index_patterns: [".ds-*"]
      priority: 10001
      template:
        settings:
          index:
            number_of_replicas: 0
    status_code: [200, 201]
  register: datastream_template_result
  when: result.status is defined and result.status == 200
  no_log: "{{ not debug_mode }}"


# Set cluster-wide default for new indices (Elasticsearch 7.0+)
- name: Set cluster-wide default number of replicas
  uri:
    url: "{{ local_es_url }}/_cluster/settings"
    method: PUT
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      persistent:
        cluster.routing.allocation.require._tier_preference: "data_content"
        cluster.routing.allocation.total_shards_per_node: 1000
    status_code: [200, 201]
  register: cluster_settings_result
  when: result.status is defined and result.status == 200
  no_log: "{{ not debug_mode }}" 