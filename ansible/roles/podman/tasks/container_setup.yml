---
# Container setup tasks for podman role

- name: Check if containers.txt exists on Ansible controller
  stat:
    path: "{{ clone_directory }}/config/containers.txt"
  register: containers_file
  delegate_to: localhost
  run_once: true
  # Note: This check runs on localhost because lookup('file', ...) reads from the controller.
  # The file must exist on the Ansible controller where the repository is cloned.

- name: Fail if containers.txt doesn't exist on controller
  fail:
    msg: |
      containers.txt file not found on Ansible controller at {{ clone_directory }}/config/containers.txt
      
      This file must exist on the Ansible controller (localhost) because the playbook uses
      lookup('file', ...) to read it. The file will be copied to target hosts later in the playbook.
      
      Please ensure:
      1. The LME repository is cloned on the Ansible controller
      2. The clone_directory variable points to the repository root on the controller
      3. The config/containers.txt file exists in the repository
  when: not containers_file.stat.exists

# Skip secret creation on cluster nodes - secrets will be copied from master via secrets_distribution role.
# Set lme_skip_secret_creation=true in elasticsearch.yml for cluster deployments.
- name: Skip secret creation (cluster node - secrets from master)
  debug:
    msg: "Skipping secret creation. Secrets will be copied from master via secrets_distribution."
  when: lme_skip_secret_creation | default(false)

- name: set service user passwords
  shell: |
    source /root/.profile 
    podman secret ls | grep -q elastic
  register: result
  become: yes
  args:
    executable: /bin/bash
  ignore_errors: true
  #only fail on a real error
  failed_when: result.rc != 0 and (result.rc == 1 and result.changed == false)
  when: not (lme_skip_secret_creation | default(false))
  
- name: Set podman secret passwords
  shell: |
    source /root/.profile 
    password="$(</dev/urandom tr -dc 'A-Za-z' | head -c1)$(</dev/urandom tr -dc 'A-Za-z0-9_.-' | head -c29)"
    while ! echo -n "$password" | grep -Eq '[_.-]+';do password="$(</dev/urandom tr -dc 'A-Za-z' | head -c1)$(</dev/urandom tr -dc 'A-Za-z0-9_.-' | head -c29)";done
    echo -n $password | podman secret create --driver shell --replace "{{ item }}" -
  args:
    executable: /bin/bash
  loop: 
    - elastic
    - kibana_system
    - wazuh_api
    - wazuh
  become: yes
  ## only run this when secrets don't exist and we're not skipping creation
  when:
    - not (lme_skip_secret_creation | default(false))
    - result.rc == 1

- name: Check if policy.json exists
  stat:
    path: /etc/containers/policy.json
  register: policy_file
  become: yes

- name: Add Container Image policy file
  copy:
    content: |
      {
          "default": [
              {
                  "type": "insecureAcceptAnything"
              }
          ]
      }
    dest: /etc/containers/policy.json
  become: yes
  when: not policy_file.stat.exists or policy_file.stat.size == 0
  
- name: Pull containers
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman pull {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ lookup('file', clone_directory + '/config/containers.txt').splitlines() | select('match', '^[^#].*') | reject('match', '^\\s*$') | list }}"
  register: pull_result
  become: yes
  retries: 3
  delay: 5
  until: pull_result is not failed
  ignore_errors: yes
  when: not (offline_mode | default(false))

- name: Display container pull errors
  debug:
    msg: "Failed to pull container: {{ item.item }}"
  loop: "{{ pull_result.results }}"
  when: item is failed and not (offline_mode | default(false))
  loop_control:
    label: "{{ item.item }}"

- name: Load and tag containers from offline resources
  include_tasks: load_offline_containers.yml
  when: offline_mode | default(false)

- name: Tag containers (online mode only)
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman image tag {{ item }} {{ item.split('/')[-1].split(':')[0] }}:LME_LATEST
  args:
    executable: /bin/bash
  loop: "{{ lookup('file', clone_directory + '/config/containers.txt').splitlines() }}"
  register: tag_result
  become: yes
  retries: 3
  delay: 5
  until: tag_result is not failed
  ignore_errors: yes
  when: not (offline_mode | default(false))

- name: Display container tag errors (online mode only)
  debug:
    msg: "Failed to tag container: {{ item.item }}"
  loop: "{{ tag_result.results }}"
  when:
    - not (offline_mode | default(false))
    - item is failed
  loop_control:
    label: "{{ item.item }}"

- name: Display container tag errors
  debug:
    msg: "Failed to tag container: {{ item.item }}"
  loop: "{{ tag_result.results }}"
  when: item is failed
  loop_control:
    label: "{{ item.item }}"