---
# Llama.cpp setup tasks for podman role

- name: Pull llama.cpp container image
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman pull ghcr.io/ggml-org/llama.cpp:server
  args:
    executable: /bin/bash
  register: pull_llama_result
  become: yes
  retries: 3
  delay: 5
  until: pull_llama_result is not failed
  when: not (offline_mode | default(false))

- name: Tag llama.cpp container image
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman image tag ghcr.io/ggml-org/llama.cpp:server localhost/llama-cpp:LME_LATEST
  args:
    executable: /bin/bash
  register: tag_llama_result
  become: yes
  retries: 3
  delay: 5
  until: tag_llama_result is not failed
  when: not (offline_mode | default(false))

- name: Pull LiteLLM container image
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman pull ghcr.io/berriai/litellm:main-latest
  args:
    executable: /bin/bash
  register: pull_litellm_result
  become: yes
  retries: 3
  delay: 5
  until: pull_litellm_result is not failed
  when: not (offline_mode | default(false))

- name: Tag LiteLLM container image
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    podman image tag ghcr.io/berriai/litellm:main-latest localhost/litellm:LME_LATEST
  args:
    executable: /bin/bash
  register: tag_litellm_result
  become: yes
  retries: 3
  delay: 5
  until: tag_litellm_result is not failed
  when: not (offline_mode | default(false))

- name: Create llama models directory
  file:
    path: /opt/lme/llama-models
    state: directory
    owner: "{{ install_user }}"
    group: "{{ install_user }}"
    mode: '0755'
  become: yes

- name: Download Gemma 3 1B model (Q4_K_M quantization)
  get_url:
    url: https://huggingface.co/unsloth/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q4_K_M.gguf
    dest: /opt/lme/llama-models/gemma-3-1b-it-Q4_K_M.gguf
    owner: "{{ install_user }}"
    group: "{{ install_user }}"
    mode: '0644'
    timeout: 600
  become: yes
  when: not (offline_mode | default(false))
  register: model_download
  retries: 3
  delay: 10
  until: model_download is not failed

- name: Copy llama.cpp quadlet file to /etc/containers/systemd
  copy:
    src: "{{ clone_directory }}/quadlet/lme-llama-cpp.container"
    dest: /etc/containers/systemd/lme-llama-cpp.container
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes

- name: Copy LiteLLM config file to /opt/lme/config
  copy:
    src: "{{ clone_directory }}/config/litellm_config.yaml"
    dest: /opt/lme/config/litellm_config.yaml
    owner: "{{ install_user }}"
    group: "{{ install_user }}"
    mode: '0644'
  become: yes

- name: Copy LiteLLM quadlet file to /etc/containers/systemd
  copy:
    src: "{{ clone_directory }}/quadlet/lme-litellm.container"
    dest: /etc/containers/systemd/lme-litellm.container
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes

- name: Build LME Log Analyzer container image
  shell: |
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    cd {{ clone_directory }}/lme-log-analyzer
    podman build -t localhost/lme-log-analyzer:LME_LATEST .
  args:
    executable: /bin/bash
  register: build_log_analyzer_result
  become: yes
  when: not (offline_mode | default(false))

- name: Copy Log Analyzer quadlet file to /etc/containers/systemd
  copy:
    src: "{{ clone_directory }}/quadlet/lme-log-analyzer.container"
    dest: /etc/containers/systemd/lme-log-analyzer.container
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes

- name: Reload systemd daemon for llama.cpp and LiteLLM
  systemd:
    daemon_reload: yes
  become: yes

- name: Enable and start llama.cpp service
  systemd:
    name: lme-llama-cpp.service
    enabled: yes
    state: started
  become: yes
  when: model_download is succeeded

# Removed wait for llama.cpp - not needed

- name: Enable and start LiteLLM service
  systemd:
    name: lme-litellm.service
    enabled: yes
    state: started
  become: yes
  when: model_download is succeeded

- name: Display llama.cpp setup success message
  debug:
    msg: |
      Llama.cpp server with Gemma 3 1B model has been installed and started!

      LiteLLM Proxy (with HTTPS) is available at: https://{{ ansible_default_ipv4.address }}:11435
      Direct llama.cpp access (HTTP only) at: http://{{ ansible_default_ipv4.address }}:11434

      API Key for LiteLLM: sk-lme-llama-proxy
      Model name: gemma-3-1b
      Model file: /opt/lme/llama-models/gemma-3-1b-it-Q4_K_M.gguf

      Example usage:
        curl -k https://localhost:11435/v1/chat/completions \
          -H "Authorization: Bearer sk-lme-llama-proxy" \
          -H "Content-Type: application/json" \
          -d '{"model": "gemma-3-1b", "messages": [{"role": "user", "content": "Hello!"}]}'
  when: model_download is succeeded

- name: Display llama.cpp offline mode message
  debug:
    msg: |
      Llama.cpp server has been configured but model was not downloaded (offline mode).
      To use it:
      1. Manually download a GGUF model file to /opt/lme/llama-models/
      2. Update the Exec line in /etc/containers/systemd/lme-llama-cpp.container to point to your model
      3. Start the service: sudo systemctl daemon-reload && sudo systemctl start lme-llama-cpp.service
  when: offline_mode | default(false)

