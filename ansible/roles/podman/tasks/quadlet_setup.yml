---
# Quadlet setup tasks for podman role

- name: Copy config files /opt/lme/config
  copy:
    src: "{{ clone_directory }}/config/"
    dest: /opt/lme/config/
    owner: "{{ install_user }}"
    group: "{{ install_user }}"
    mode: '0644'
    force: "{{ lme_force_config | default(false) }}"
  become: yes

- name: Render Elasticsearch config (cluster-aware)
  template:
    src: "{{ clone_directory }}/ansible/templates/elasticsearch.yml.j2"
    dest: /opt/lme/config/elasticsearch.yml
    owner: "{{ install_user }}"
    group: "{{ install_user }}"
    mode: '0644'
  become: yes

# Configure Kibana for offline/air-gapped mode BEFORE starting services
# This must happen after config files are copied but before LME service starts
- name: Configure Kibana for offline mode
  blockinfile:
    path: /opt/lme/config/kibana.yml
    marker: "# {mark} ANSIBLE MANAGED BLOCK - OFFLINE MODE"
    block: |
      xpack.fleet.registryUrl: "https://lme-fleet-distribution:8080"
      xpack.fleet.isAirGapped: true
  become: yes
  when: offline_mode | default(false)

- name: Create /etc/containers/systemd
  file:
    path: /etc/containers/systemd
    state: directory
    owner: "root"
    group: "root"
    mode: '0744'
  become: yes

- name: Create local quadlet staging directory
  file:
    path: "{{ lme_quadlet_source_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode: '0755'
  become: yes

- name: Stage full quadlet source tree under /opt/lme
  copy:
    src: "{{ clone_directory }}/quadlet/"
    dest: "{{ lme_quadlet_source_dir }}/"
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes

- name: Copy full quadlet files to /etc/containers/systemd
  copy:
    src: "{{ clone_directory }}/quadlet/"
    dest: /etc/containers/systemd/
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes
  when: not (lme_child_es_only | default(false) | bool)

# ---------------------------------------------------------------------------
# Compute child-absent quadlet/systemd sets from the repo's quadlet/ directory.
# Source of truth is the filesystem: anything in quadlet/ that is not in
# `lme_child_active_quadlet_files` or `lme_child_active_extras` is pruned from
# child (ES-only) nodes. This avoids having to maintain parallel deny lists.
#
# The find runs once on the controller (playbook lives on the master / CI host).
# Do not gate this task on lme_child_es_only: with run_once, other hosts would
# skip and see a registered dict without `.files`, breaking set_fact on es2/es3.
# ---------------------------------------------------------------------------
- name: Enumerate quadlet files shipped in the repo
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../quadlet"
    file_type: file
    patterns:
      - '*.container'
      - '*.volume'
      - '*.network'
      - '*.service'
  delegate_to: localhost
  connection: local
  run_once: true
  become: false
  register: lme_quadlet_find_raw

- name: Compute child-absent quadlet files (quadlet/ minus active minus extras)
  ansible.builtin.set_fact:
    lme_child_absent_quadlet_files: >-
      {{ (quadlet_paths.files | default([]) | map(attribute='path') | map('basename') | list)
         | difference(lme_child_active_quadlet_files + lme_child_active_extras) }}
  vars:
    quadlet_paths: "{{ hostvars[ansible_play_hosts[0]]['lme_quadlet_find_raw'] }}"
  when: lme_child_es_only | default(false) | bool

- name: Compute child-absent systemd units (.container -> .service, skip volumes/networks)
  ansible.builtin.set_fact:
    lme_child_absent_systemd_units: >-
      {{ lme_child_absent_quadlet_files
         | reject('match', '.*\.(volume|network)$')
         | map('regex_replace', '\.container$', '.service')
         | list }}
  when: lme_child_es_only | default(false) | bool

- name: Show computed child-absent sets (diagnostic)
  ansible.builtin.debug:
    msg:
      absent_quadlet_files: "{{ lme_child_absent_quadlet_files }}"
      absent_systemd_units: "{{ lme_child_absent_systemd_units }}"
  when: lme_child_es_only | default(false) | bool

- name: Stop non-ES services before pruning child quadlets
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop: "{{ lme_child_absent_systemd_units }}"
  failed_when: false
  become: yes
  when: lme_child_es_only | default(false) | bool

- name: Copy child-required quadlet files to /etc/containers/systemd
  copy:
    src: "{{ clone_directory }}/quadlet/{{ item }}"
    dest: "/etc/containers/systemd/{{ item }}"
    owner: "root"
    group: "root"
    mode: '0644'
  loop: "{{ lme_child_active_quadlet_files }}"
  become: yes
  when: lme_child_es_only | default(false) | bool

- name: Render Elasticsearch quadlet from template (cluster-aware)
  template:
    src: "{{ clone_directory }}/ansible/templates/lme-elasticsearch.container.j2"
    dest: /etc/containers/systemd/lme-elasticsearch.container
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes

- name: Remove non-ES quadlet source files from child nodes
  file:
    path: "/etc/containers/systemd/{{ item }}"
    state: absent
  loop: "{{ lme_child_absent_quadlet_files }}"
  become: yes
  when: lme_child_es_only | default(false) | bool

- name: Copy lme.service to /etc/systemd/system
  copy:
    src: "{{ clone_directory }}/quadlet/lme.service"
    dest: "/etc/systemd/system/lme.service"
    owner: "root"
    group: "root"
    mode: '0644'
  become: yes
  when: not (lme_child_es_only | default(false) | bool)

- name: Remove lme.service from /etc/systemd/system on child nodes
  file:
    path: /etc/systemd/system/lme.service
    state: absent
  become: yes
  when: lme_child_es_only | default(false) | bool

# Ensure quadlet helper and systemd generator are available from standard paths
# Skip for RHEL offline mode - system podman already has these in place
- name: Ensure /usr/libexec/podman exists
  file:
    path: /usr/libexec/podman
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: yes
  when: not (offline_mode | default(false) and ansible_os_family == "RedHat")

- name: Link quadlet helper into /usr/libexec/podman
  file:
    src: /nix/var/nix/profiles/default/libexec/podman/quadlet
    dest: /usr/libexec/podman/quadlet
    state: link
    force: true
  become: yes
  when: not (offline_mode | default(false) and ansible_os_family == "RedHat")

- name: Ensure podman systemd generator is linked
  file:
    src: /nix/var/nix/profiles/default/libexec/podman/quadlet
    dest: /usr/lib/systemd/system-generators/podman-system-generator
    state: link
    force: true
  become: yes
  when: not (offline_mode | default(false) and ansible_os_family == "RedHat")

- name: Restore contexts on quadlet/generator paths (best-effort)
  command: restorecon -v /usr/libexec/podman/quadlet /usr/lib/systemd/system-generators/podman-system-generator
  changed_when: false
  failed_when: false
  become: yes
  when: not (offline_mode | default(false) and ansible_os_family == "RedHat")

# For RHEL offline mode - verify system podman quadlet is available
- name: Verify system podman quadlet exists (RHEL offline)
  stat:
    path: /usr/libexec/podman/quadlet
  register: system_podman_quadlet
  when: offline_mode | default(false) and ansible_os_family == "RedHat"

- name: Fail if system podman quadlet not found (RHEL offline)
  fail:
    msg: "System podman quadlet not found. Please ensure podman RPM is properly installed."
  when:
    - offline_mode | default(false) and ansible_os_family == "RedHat"
    - not system_podman_quadlet.stat.exists

# ---------------------------------------------------------------------------
# Apply SELinux contexts after podman installation and symlink creation
# ---------------------------------------------------------------------------

# Apply SELinux contexts to paths (now that podman_policy module defines the contexts)
- name: Apply SELinux contexts to system generator paths (if they exist)
  command: restorecon -Rv "{{ item }}"
  changed_when: false
  failed_when: false
  become: yes
  loop:
    - "/usr/libexec/podman/quadlet"
    - "/usr/lib/systemd/system-generators/podman-system-generator"
    - "/usr/lib/systemd/system-generators"
    - "/etc/systemd/system-generators"  # May be created by systemd after module load
    - "/etc/containers/systemd"
  when:
    - selinux_available | default(false)
    - (getenforce_out.stdout | default('') | trim) != 'Disabled'

- name: Apply SELinux contexts to Nix paths (final podman restorecon)
  command: restorecon -Rv "{{ item }}"
  changed_when: false
  failed_when: false
  become: yes
  loop:
    - "/nix/var/nix/profiles/default"
    - "/nix/store"
  when:
    - selinux_available | default(false)
    - (getenforce_out.stdout | default('') | trim) != 'Disabled'
    - not (offline_mode | default(false) and ansible_os_family == "RedHat")

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  become: yes

- name: Start LME service
  systemd:
    name: lme.service
    state: started
    enabled: yes
  become: yes 
  when: lme_autostart | default(true) | bool