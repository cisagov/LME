---
# Extract and set global secrets
#
# This task supports two modes:
# 1. Master node (extract_secrets.sh exists): Use the script
# 2. Cluster nodes (script doesn't exist): Extract directly from vault files
#
# On cluster nodes, the secrets_distribution role copies the vault files and
# podman secrets database from the master, so we can extract secrets directly.

- name: Debug - Test podman secret ls directly
  shell: podman secret ls
  register: podman_secret_test
  become: yes
  ignore_errors: true

- name: Debug - Show podman secret ls output
  debug:
    msg: "Podman secret ls result: {{ podman_secret_test.stdout_lines if podman_secret_test.rc == 0 else 'FAILED: ' + podman_secret_test.stderr }}"

- name: Check if extract_secrets.sh script exists on controller
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../scripts/extract_secrets.sh"
  register: extract_script_stat
  delegate_to: localhost
  run_once: true

- name: Determine if we should use the script or direct extraction
  ansible.builtin.set_fact:
    use_extract_script: "{{ extract_script_stat.stat.exists and inventory_hostname in ['localhost', '127.0.0.1'] }}"

- name: Source extract_secrets and capture output (master node with script)
  ansible.builtin.shell: |
    set -a
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    source {{ playbook_dir }}/../scripts/extract_secrets.sh -q
    echo "elastic=$elastic"
    echo "wazuh=$wazuh"
    echo "kibana_system=$kibana_system"
    echo "wazuh_api=$wazuh_api"
  args:
    executable: /bin/bash
  register: extract_secrets_script_result
  no_log: "{{ not debug_mode }}"
  become: yes
  when: use_extract_script

- name: Extract secrets directly from vault files (cluster nodes)
  ansible.builtin.shell: |
    set -a
    export PATH=$PATH:/nix/var/nix/profiles/default/bin
    export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh
    
    # Get secret IDs from podman secret ls (using --noheading to skip header line)
    elastic_id=""
    wazuh_id=""
    kibana_system_id=""
    wazuh_api_id=""
    
    while read -r line; do
      id=$(echo "$line" | awk '{print $1}')
      name=$(echo "$line" | awk '{print $2}')
      case "$name" in
        elastic) elastic_id="$id" ;;
        wazuh) wazuh_id="$id" ;;
        kibana_system) kibana_system_id="$id" ;;
        wazuh_api) wazuh_api_id="$id" ;;
      esac
    done < <(podman secret ls --noheading 2>/dev/null)
    
    # Extract each secret from vault
    elastic=""
    wazuh=""
    kibana_system=""
    wazuh_api=""
    
    if [ -n "$elastic_id" ] && [ -f "/etc/lme/vault/$elastic_id" ]; then
      elastic=$(ansible-vault view "/etc/lme/vault/$elastic_id" 2>/dev/null | tr -d '\n')
    fi
    if [ -n "$wazuh_id" ] && [ -f "/etc/lme/vault/$wazuh_id" ]; then
      wazuh=$(ansible-vault view "/etc/lme/vault/$wazuh_id" 2>/dev/null | tr -d '\n')
    fi
    if [ -n "$kibana_system_id" ] && [ -f "/etc/lme/vault/$kibana_system_id" ]; then
      kibana_system=$(ansible-vault view "/etc/lme/vault/$kibana_system_id" 2>/dev/null | tr -d '\n')
    fi
    if [ -n "$wazuh_api_id" ] && [ -f "/etc/lme/vault/$wazuh_api_id" ]; then
      wazuh_api=$(ansible-vault view "/etc/lme/vault/$wazuh_api_id" 2>/dev/null | tr -d '\n')
    fi
    
    echo "elastic=$elastic"
    echo "wazuh=$wazuh"
    echo "kibana_system=$kibana_system"
    echo "wazuh_api=$wazuh_api"
  args:
    executable: /bin/bash
  register: extract_secrets_direct_result
  no_log: "{{ not debug_mode }}"
  become: yes
  when: not use_extract_script

- name: Set extract_secrets_vars from whichever method was used
  ansible.builtin.set_fact:
    extract_secrets_vars: "{{ extract_secrets_script_result if use_extract_script else extract_secrets_direct_result }}"

- name: Debug extract_secrets output
  debug:
    var: extract_secrets_vars.stdout_lines
  when: debug_mode | bool

- name: Set global secret variables
  ansible.builtin.set_fact:
    global_secrets: "{{ global_secrets | default({}) | combine({ item.split('=', 1)[0]: item.split('=', 1)[1] }) }}"
  loop: "{{ extract_secrets_vars.stdout_lines | default([]) }}"
  when: item != '' and '=' in item
  no_log: "{{ not debug_mode }}"

- name: Verify global secrets were set
  debug:
    msg: "Global secrets keys: {{ global_secrets.keys() | list }}"
  when: debug_mode | bool

- name: Fail if required secrets are missing
  fail:
    msg: "Required secrets are missing. Found: {{ global_secrets.keys() | list }}"
  when: 
    - not global_secrets.elastic is defined
    - not global_secrets.wazuh is defined
    - not global_secrets.kibana_system is defined
    - not global_secrets.wazuh_api is defined 