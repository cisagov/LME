---
# Distribute vault password + encrypted secrets to all nodes.
#
# This is required for Podman's shell secret driver to work consistently across
# remote nodes.
#
# The secrets source is determined as follows:
# - If lme_secrets_source_host is explicitly set, use that
# - Otherwise, use localhost (the ansible controller, which should be the master)
#
# This works because elasticsearch.yml is run FROM the master node to cluster nodes,
# so localhost (the controller) has the secrets generated by site.yml.
#
# This role uses a "push" pattern: the bundle is read from the source host via slurp
# and pushed directly to targets with become: true, ensuring files arrive root-owned.

- name: Determine secrets source host
  ansible.builtin.set_fact:
    lme_secrets_source_host: "{{ lme_secrets_source_host | default('localhost') }}"
  run_once: true

- name: Ensure podman secrets storage directory exists on source host
  ansible.builtin.file:
    path: /var/lib/containers/storage/secrets
    state: directory
    mode: '0700'
  delegate_to: "{{ lme_secrets_source_host }}"
  run_once: true
  become: true

- name: Create tarball of vault/secrets on source host
  ansible.builtin.command: >-
    tar -czf /tmp/lme_secrets.tgz
    /etc/lme/pass.sh
    /etc/lme/vault
    /root/.config/containers/containers.conf
    /var/lib/containers/storage/secrets/secrets.json
  delegate_to: "{{ lme_secrets_source_host }}"
  run_once: true
  become: true

- name: Read secrets bundle from source host
  ansible.builtin.slurp:
    src: /tmp/lme_secrets.tgz
  register: secrets_bundle
  delegate_to: "{{ lme_secrets_source_host }}"
  run_once: true
  become: true
  no_log: true

- name: Push secrets bundle to target host
  ansible.builtin.copy:
    dest: /tmp/lme_secrets.tgz
    content: "{{ secrets_bundle.content | b64decode }}"
    mode: '0600'
  become: true
  no_log: true

- name: Ensure podman secrets storage directory exists on target host
  ansible.builtin.file:
    path: /var/lib/containers/storage/secrets
    state: directory
    mode: '0700'
    owner: root
    group: root
  become: true

- name: Extract secrets bundle into place
  ansible.builtin.command: tar -xzf /tmp/lme_secrets.tgz -C /
  become: true

- name: Set proper permissions on secrets.json
  ansible.builtin.file:
    path: /var/lib/containers/storage/secrets/secrets.json
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Remove secrets bundle on target host
  ansible.builtin.file:
    path: /tmp/lme_secrets.tgz
    state: absent
  become: true

- name: Remove secrets bundle on source host (best-effort)
  ansible.builtin.file:
    path: /tmp/lme_secrets.tgz
    state: absent
  delegate_to: "{{ lme_secrets_source_host }}"
  run_once: true
  become: true
  failed_when: false
