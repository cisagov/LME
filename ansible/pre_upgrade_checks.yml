---
# Standalone playbook for running pre-upgrade verification checks.
# Can be run independently before an upgrade window to verify readiness.
#
# Usage:
#   ansible-playbook -i ansible/inventory/cluster.yml ansible/pre_upgrade_checks.yml
#
# Options:
#   -e pre_check_disk_threshold=90          Override disk usage threshold (default: 85%)
#   -e create_pre_upgrade_snapshot=true     Create a snapshot (default: prompt, no)
#
- name: Pre-upgrade verification for Elasticsearch cluster
  hosts: elasticsearch
  become: yes
  vars:
    clone_directory: "{{ clone_dir | default(playbook_dir + '/..') }}"

    # Pre-check thresholds
    disk_space_threshold_percent: "{{ pre_check_disk_threshold | default(85) }}"

    # Snapshot settings (matches snapshot_elasticsearch.yml)
    es_snapshot_repo: lme_backups
    es_snapshot_repo_type: fs
    es_snapshot_repo_settings:
      location: "/usr/share/elasticsearch/backups"
    snapshot_name: "pre-upgrade-{{ ansible_date_time.iso8601_basic_short }}"

  tasks:
    - name: Ensure /opt/lme/scripts has the latest helper scripts
      ansible.builtin.include_tasks: tasks/setup_lme_scripts.yml

    - name: Read lme-environment.env
      ansible.builtin.slurp:
        src: /opt/lme/lme-environment.env
      register: lme_env_content
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"

    - name: Set environment variables
      ansible.builtin.set_fact:
        env_dict: "{{ env_dict | default({}) | combine({ item.split('=', 1)[0]: item.split('=', 1)[1] }) }}"
      loop: "{{ (lme_env_content['content'] | b64decode).split('\n') }}"
      when: item != '' and not item.startswith('#')
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"

    - name: Extract elastic password
      ansible.builtin.shell: |
        set -a
        source /root/.profile
        source /opt/lme/scripts/extract_secrets.sh -q
        echo "elastic=$elastic"
      args:
        executable: /bin/bash
      register: extract_secrets_vars
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"
      no_log: true

    - name: Set elastic credentials
      ansible.builtin.set_fact:
        local_es_url: "{{ env_dict.LOCAL_ES_URL | default('https://localhost:9200') }}"
        elastic_username: "{{ env_dict.ELASTIC_USERNAME | default('elastic') }}"
        elastic_password: "{{ (extract_secrets_vars.stdout_lines | select('match', '^elastic=') | list | first).split('=', 1)[1] }}"
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"
      no_log: true

    - name: Run pre-upgrade verification checks
      ansible.builtin.include_tasks: tasks/pre_upgrade_checks.yml
