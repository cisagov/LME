---
# Pre-upgrade verification checks for Elasticsearch cluster
# Can be included from rolling_upgrade.yml or run via pre_upgrade_checks.yml wrapper
#
# Expects these variables to be set before inclusion:
#   - local_es_url, elastic_username, elastic_password (credentials)
#   - disk_space_threshold_percent (default 85)
#   - es_snapshot_repo, es_snapshot_repo_type, es_snapshot_repo_settings (snapshot config)
#   - snapshot_name (snapshot identifier)
# Optional:
#   - create_pre_upgrade_snapshot: true/false (skips interactive prompt)

# --- Check 1: Cluster health is green ---

- name: "Pre-check: Get cluster health"
  ansible.builtin.uri:
    url: "{{ local_es_url }}/_cluster/health"
    method: GET
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: pre_check_health
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Assert cluster health is green"
  ansible.builtin.assert:
    that:
      - pre_check_health.json.status == 'green'
    fail_msg: >-
      UPGRADE BLOCKED: Cluster health is '{{ pre_check_health.json.status }}', expected 'green'.
      Unassigned shards: {{ pre_check_health.json.unassigned_shards }}.
      Relocating shards: {{ pre_check_health.json.relocating_shards }}.
      Resolve cluster health issues before attempting upgrade.
    success_msg: >-
      Cluster health is green
      ({{ pre_check_health.json.number_of_nodes }} nodes, {{ pre_check_health.json.active_shards }} active shards)
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

# --- Check 2: Document current version on all nodes ---

- name: "Pre-check: Get node versions"
  ansible.builtin.uri:
    url: "{{ local_es_url }}/_nodes?filter_path=nodes.*.name,nodes.*.version,nodes.*.roles"
    method: GET
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: pre_check_nodes
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Document node versions"
  ansible.builtin.debug:
    msg: |
      === Current Elasticsearch Node Versions ===
      {% for node_id, node_info in pre_check_nodes.json.nodes.items() %}
      Node: {{ node_info.name }} - Version: {{ node_info.version }} - Roles: {{ node_info.roles | join(', ') }}
      {% endfor %}
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Verify all nodes are on the same version"
  ansible.builtin.assert:
    that:
      - pre_check_nodes.json.nodes.values() | map(attribute='version') | unique | list | length == 1
    fail_msg: >-
      UPGRADE BLOCKED: Nodes are running different versions.
      {% for node_id, node_info in pre_check_nodes.json.nodes.items() %}
      {{ node_info.name }}={{ node_info.version }}
      {% endfor %}
      All nodes must be on the same version before a rolling upgrade.
    success_msg: >-
      All nodes are on version {{ pre_check_nodes.json.nodes.values() | map(attribute='version') | first }}
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

# --- Check 3: Verify sufficient disk space on all nodes ---

- name: "Pre-check: Get disk allocation info"
  ansible.builtin.uri:
    url: "{{ local_es_url }}/_cat/allocation?format=json&bytes=b"
    method: GET
    user: "{{ elastic_username }}"
    password: "{{ elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: pre_check_disk
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Display disk allocation"
  ansible.builtin.debug:
    msg: |
      === Disk Allocation by Node ===
      {% for node in pre_check_disk.json %}
      {% if node['disk.percent'] is not none %}
      Node: {{ node.node }} - Disk used: {{ node['disk.percent'] }}% - Disk avail: {{ (node['disk.avail'] | int / 1073741824) | round(1) }} GB
      {% endif %}
      {% endfor %}
      Threshold: {{ disk_space_threshold_percent }}%
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Collect disk percents"
  ansible.builtin.set_fact:
    pre_check_disk_percents: "{{ pre_check_disk_percents | default([]) + [item['disk.percent'] | int] }}"
  loop: "{{ pre_check_disk.json }}"
  when: item['disk.percent'] is not none and item['disk.percent'] != ''
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Assert disk usage is below threshold"
  ansible.builtin.assert:
    that:
      - pre_check_disk_percents | max <= disk_space_threshold_percent | int
    fail_msg: >-
      UPGRADE BLOCKED: One or more nodes exceed the disk usage threshold of {{ disk_space_threshold_percent }}%.
      {% for node in pre_check_disk.json %}
      {% if node['disk.percent'] is not none and node['disk.percent'] | int > disk_space_threshold_percent | int %}
      OVER THRESHOLD: {{ node.node }} at {{ node['disk.percent'] }}%
      {% endif %}
      {% endfor %}
      Free up disk space or increase the threshold with: -e pre_check_disk_threshold=90
    success_msg: "All nodes are below {{ disk_space_threshold_percent }}% disk usage"
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

# --- Check 4: Create pre-upgrade snapshot ---
# TODO: Once snapshot infrastructure is confirmed for clusters, flip the default
# to create_pre_upgrade_snapshot=true (opt-out instead of opt-in).

- name: "Pre-check: Create pre-upgrade snapshot"
  when: create_pre_upgrade_snapshot | default(false) | bool
  block:
    - name: "Pre-check: Register snapshot repository"
      ansible.builtin.uri:
        url: "{{ local_es_url }}/_snapshot/{{ es_snapshot_repo }}"
        method: PUT
        user: "{{ elastic_username }}"
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          type: "{{ es_snapshot_repo_type }}"
          settings: "{{ es_snapshot_repo_settings }}"
        status_code: [200]
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"

    - name: "Pre-check: Create snapshot (this may take several minutes)"
      ansible.builtin.uri:
        url: "{{ local_es_url }}/_snapshot/{{ es_snapshot_repo }}/{{ snapshot_name }}?wait_for_completion=true"
        method: PUT
        user: "{{ elastic_username }}"
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          indices: "*"
          include_global_state: true
        status_code: [200]
        timeout: 3600
      register: pre_check_snapshot
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"

    - name: "Pre-check: Verify snapshot succeeded"
      ansible.builtin.assert:
        that:
          - pre_check_snapshot.json.snapshot.state == 'SUCCESS'
        fail_msg: >-
          UPGRADE BLOCKED: Pre-upgrade snapshot failed.
          Snapshot state: {{ pre_check_snapshot.json.snapshot.state }}.
          Failures: {{ pre_check_snapshot.json.snapshot.failures | default([]) }}.
          Resolve snapshot issues before attempting upgrade.
        success_msg: >-
          Pre-upgrade snapshot '{{ snapshot_name }}' created successfully
          ({{ pre_check_snapshot.json.snapshot.shards.successful }} shards)
      run_once: true
      delegate_to: "{{ groups['elasticsearch'][0] }}"

- name: "Pre-check: Snapshot skipped"
  ansible.builtin.debug:
    msg: "Pre-upgrade snapshot was not requested. To create one, pass -e create_pre_upgrade_snapshot=true"
  when: not (create_pre_upgrade_snapshot | default(false) | bool)
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"

# --- Check 5: Summary ---

- name: "Pre-check: Display summary"
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "  Pre-Upgrade Verification PASSED"
      - "============================================"
      - ""
      - "Cluster health: {{ pre_check_health.json.status }}"
      - "Nodes: {{ pre_check_health.json.number_of_nodes }}"
      - "ES version: {{ pre_check_nodes.json.nodes.values() | map(attribute='version') | first }}"
      - "Max disk usage: {{ pre_check_disk_percents | max }}% (threshold: {{ disk_space_threshold_percent }}%)"
      - "Snapshot: {{ snapshot_name if (create_pre_upgrade_snapshot | default(false) | bool) else 'SKIPPED (pass -e create_pre_upgrade_snapshot=true to enable)' }}"
      - ""
      - "Upgrade may proceed."
  run_once: true
  delegate_to: "{{ groups['elasticsearch'][0] }}"
