---
# change_passwords.yml
#
# Changes a user's password across all nodes in an LME cluster.
# Works for both single-node and multi-node deployments.
#
# Supported users:
#   - elastic, kibana_system  (Elasticsearch -- changed via ES REST API)
#   - wazuh, wazuh_api        (Wazuh -- changed via RBAC tool)
#
# Prerequisites:
#   - A running LME installation (single-node or cluster)
#   - For clusters: SSH connectivity from master to all nodes
#   - ansible-vault password configured (/etc/lme/pass.sh)
#
# Usage:
#   # Single-node (no inventory needed):
#   ansible-playbook ansible/change_passwords.yml \
#     -e lme_user=elastic -e lme_password='NewSecurePassword123!'
#
#   # Cluster:
#   ansible-playbook -i ansible/inventory/cluster.yml ansible/change_passwords.yml \
#     -e lme_user=elastic -e lme_password='NewSecurePassword123!'
#
#   # Skip HIBP breach check (offline environments):
#   ansible-playbook ansible/change_passwords.yml \
#     -e lme_user=elastic -e lme_password='NewSecurePassword123!' -e offline_mode=true

###############################################################################
# Play 1: Validate inputs and update password on master node
###############################################################################
- name: "Phase 1: Validate and change password on master"
  hosts: "{{ (groups['elasticsearch'] | default([target_host | default('localhost')]))[0] }}"
  connection: "{{ hostvars[(groups['elasticsearch'] | default([target_host | default('localhost')]))[0]].ansible_connection | default('local') }}"
  become: yes
  vars:
    clone_directory: "{{ clone_dir | default(playbook_dir + '/..') }}"
    user_vault_dir: /etc/lme/vault
    min_length: 12
    debug_mode: "{{ lme_debug | default(false) }}"
    offline_mode: "{{ lme_offline | default(false) }}"
    nix_bin: /nix/var/nix/profiles/default/bin

  tasks:
    # ------------------------------------------------------------------
    # Input validation
    # ------------------------------------------------------------------
    - name: Validate required variables
      assert:
        that:
          - lme_user is defined and lme_user | length > 0
          - lme_password is defined and lme_password | length > 0
        fail_msg: >-
          Required variables missing. Usage:
          ansible-playbook ansible/change_passwords.yml
          -e lme_user=elastic -e lme_password='YourNewPassword'

    - name: Validate username is a known LME user
      assert:
        that:
          - lme_user in ['elastic', 'kibana_system', 'wazuh', 'wazuh_api']
        fail_msg: >-
          Unknown user '{{ lme_user }}'.
          Supported users: elastic, kibana_system, wazuh, wazuh_api

    - name: Validate password length (NIST SP 800-63B)
      assert:
        that:
          - lme_password | length >= min_length
        fail_msg: "Password must be at least {{ min_length }} characters long (NIST SP 800-63B)."

    # ------------------------------------------------------------------
    # HIBP breach check (skipped in offline mode)
    # ------------------------------------------------------------------
    - name: Check password against Have I Been Pwned
      block:
        - name: Generate SHA-1 hash of new password
          ansible.builtin.shell: echo -n "$LME_NEW_PASSWORD" | openssl sha1 | awk '{print $2}'
          args:
            executable: /bin/bash
          environment:
            LME_NEW_PASSWORD: "{{ lme_password }}"
          register: pw_hash
          no_log: true

        - name: Query HIBP API
          uri:
            url: "https://api.pwnedpasswords.com/range/{{ pw_hash.stdout[0:5] }}"
            method: GET
            return_content: yes
          register: hibp_response

        - name: Fail if password found in known breaches
          fail:
            msg: "Password has been found in known data breaches. Choose a different password."
          when: hibp_response.content | upper is search(pw_hash.stdout[5:] | upper)
      when: not (offline_mode | bool)

    # ------------------------------------------------------------------
    # Extract current elastic password (needed for ES API auth)
    # ------------------------------------------------------------------
    - name: Extract current elastic password
      ansible.builtin.shell: |
        set -a
        export PATH=$PATH:{{ nix_bin }}
        source {{ clone_directory }}/scripts/extract_secrets.sh -q
        printf '%s' "$elastic"
      args:
        executable: /bin/bash
      register: current_elastic_pw_result
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user in ['elastic', 'kibana_system']

    - name: Set current elastic password fact
      ansible.builtin.set_fact:
        current_elastic_password: "{{ current_elastic_pw_result.stdout }}"
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user in ['elastic', 'kibana_system']

    # ------------------------------------------------------------------
    # Change password in Elasticsearch (cluster-wide via REST API)
    # ------------------------------------------------------------------
    - name: Change Elasticsearch user password via REST API
      uri:
        url: "https://127.0.0.1:9200/_security/user/{{ lme_user }}/_password"
        method: POST
        user: elastic
        password: "{{ current_elastic_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          password: "{{ lme_password }}"
        status_code: [200]
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user in ['elastic', 'kibana_system']

    # ------------------------------------------------------------------
    # Change Wazuh password (via RBAC tool on master)
    # ------------------------------------------------------------------
    - name: Ensure expect is installed (Wazuh password change)
      ansible.builtin.package:
        name: expect
        state: present
      when: lme_user in ['wazuh', 'wazuh_api']

    - name: Change Wazuh password via RBAC tool
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        cd {{ clone_directory }}/scripts
        ./reset_wazuh_password.exp "{{ lme_user }}" "$LME_NEW_PASSWORD"
      args:
        executable: /bin/bash
      environment:
        LME_NEW_PASSWORD: "{{ lme_password }}"
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user in ['wazuh', 'wazuh_api']

    # ------------------------------------------------------------------
    # Update vault file + Podman secret on master
    # ------------------------------------------------------------------
    - name: Update Podman secret for {{ lme_user }}
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh

        SECRET_ID=$(podman secret ls --noheading | awk '$2 == "{{ lme_user }}" { print $1 }')

        if [ -n "$SECRET_ID" ] && [ -f "{{ user_vault_dir }}/$SECRET_ID" ]; then
          ansible-vault decrypt "{{ user_vault_dir }}/$SECRET_ID" 2>/dev/null || true
          printf '%s' "$LME_NEW_PASSWORD" > "{{ user_vault_dir }}/$SECRET_ID"
          chmod 700 "{{ user_vault_dir }}/$SECRET_ID"
          ansible-vault encrypt "{{ user_vault_dir }}/$SECRET_ID"
          echo "updated_existing"
        else
          TMPFILE=$(mktemp)
          printf '%s' "$LME_NEW_PASSWORD" > "$TMPFILE"
          podman secret create --driver shell --replace "{{ lme_user }}" "$TMPFILE"
          rm -f "$TMPFILE"
          echo "created_new"
        fi
      args:
        executable: /bin/bash
      environment:
        LME_NEW_PASSWORD: "{{ lme_password }}"
      register: secret_update_result
      no_log: "{{ not (debug_mode | bool) }}"

    # Wazuh RBAC changes both wazuh and wazuh_api passwords together,
    # so both Podman secrets must be updated.
    - name: Update paired wazuh_api secret
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh

        SECRET_ID=$(podman secret ls --noheading | awk '$2 == "wazuh_api" { print $1 }')

        if [ -n "$SECRET_ID" ] && [ -f "{{ user_vault_dir }}/$SECRET_ID" ]; then
          ansible-vault decrypt "{{ user_vault_dir }}/$SECRET_ID" 2>/dev/null || true
          printf '%s' "$LME_NEW_PASSWORD" > "{{ user_vault_dir }}/$SECRET_ID"
          chmod 700 "{{ user_vault_dir }}/$SECRET_ID"
          ansible-vault encrypt "{{ user_vault_dir }}/$SECRET_ID"
        fi
      args:
        executable: /bin/bash
      environment:
        LME_NEW_PASSWORD: "{{ lme_password }}"
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user == 'wazuh'

    - name: Update paired wazuh secret
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh

        SECRET_ID=$(podman secret ls --noheading | awk '$2 == "wazuh" { print $1 }')

        if [ -n "$SECRET_ID" ] && [ -f "{{ user_vault_dir }}/$SECRET_ID" ]; then
          ansible-vault decrypt "{{ user_vault_dir }}/$SECRET_ID" 2>/dev/null || true
          printf '%s' "$LME_NEW_PASSWORD" > "{{ user_vault_dir }}/$SECRET_ID"
          chmod 700 "{{ user_vault_dir }}/$SECRET_ID"
          ansible-vault encrypt "{{ user_vault_dir }}/$SECRET_ID"
        fi
      args:
        executable: /bin/bash
      environment:
        LME_NEW_PASSWORD: "{{ lme_password }}"
      no_log: "{{ not (debug_mode | bool) }}"
      when: lme_user == 'wazuh_api'

    - name: Display master update result
      debug:
        msg: "Password for '{{ lme_user }}' updated on master node ({{ secret_update_result.stdout | default('done') }})."

###############################################################################
# Play 2: Distribute updated secrets to all cluster nodes
###############################################################################
- name: "Phase 2: Distribute secrets to cluster nodes"
  hosts: "{{ groups['elasticsearch'] | default([target_host | default('localhost')]) }}"
  # Note: Don't override connection here - let Ansible use inventory settings
  # (es1 uses local, es2/es3 use SSH to their ansible_host)
  become: yes
  vars:
    debug_mode: "{{ lme_debug | default(false) }}"

  tasks:
    - name: Check if this is a multi-node deployment
      ansible.builtin.set_fact:
        is_cluster: "{{ (groups['elasticsearch'] | default([])) | length > 1 }}"

    - name: Distribute secrets to cluster nodes
      ansible.builtin.include_role:
        name: secrets_distribution
      when: is_cluster | bool

    - name: Skip distribution (single-node)
      debug:
        msg: "Single-node deployment -- skipping secrets distribution."
      when: not (is_cluster | bool)

###############################################################################
# Play 3: Restart affected services and verify cluster health
###############################################################################
- name: "Phase 3: Restart services and verify cluster health"
  hosts: "{{ (groups['elasticsearch'] | default([target_host | default('localhost')]))[0] }}"
  connection: "{{ hostvars[(groups['elasticsearch'] | default([target_host | default('localhost')]))[0]].ansible_connection | default('local') }}"
  become: yes
  vars:
    clone_directory: "{{ clone_dir | default(playbook_dir + '/..') }}"
    debug_mode: "{{ lme_debug | default(false) }}"
    nix_bin: /nix/var/nix/profiles/default/bin

  tasks:
    - name: Restart Kibana (picks up new elastic or kibana_system password)
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh
        podman restart lme-kibana 2>/dev/null || true
      args:
        executable: /bin/bash
      when: lme_user in ['elastic', 'kibana_system']
      ignore_errors: yes

    - name: Restart Wazuh containers (pick up new wazuh passwords)
      ansible.builtin.shell: |
        export PATH=$PATH:{{ nix_bin }}
        export ANSIBLE_VAULT_PASSWORD_FILE=/etc/lme/pass.sh
        podman restart lme-wazuh-manager 2>/dev/null || true
      args:
        executable: /bin/bash
      when: lme_user in ['wazuh', 'wazuh_api']
      ignore_errors: yes

    # Re-extract the elastic password from vault for verification.
    # If elastic was changed, the vault now contains the new password.
    # If another user was changed, the vault still has the original elastic password.
    - name: Extract elastic password for verification
      ansible.builtin.shell: |
        set -a
        export PATH=$PATH:{{ nix_bin }}
        source {{ clone_directory }}/scripts/extract_secrets.sh -q
        printf '%s' "$elastic"
      args:
        executable: /bin/bash
      register: verify_pw_result
      no_log: "{{ not (debug_mode | bool) }}"

    - name: Wait for Elasticsearch to be healthy
      uri:
        url: "https://127.0.0.1:9200/_cluster/health"
        method: GET
        user: elastic
        password: "{{ verify_pw_result.stdout }}"
        force_basic_auth: yes
        validate_certs: no
        status_code: 200
      register: cluster_health
      until: cluster_health.status is defined and cluster_health.status == 200
      retries: 30
      delay: 10

    - name: Display completion summary
      debug:
        msg:
          - "============================================"
          - "  Password Change Complete"
          - "============================================"
          - ""
          - "User:           {{ lme_user }}"
          - "Cluster health: {{ cluster_health.json.status }}"
          - "Cluster nodes:  {{ cluster_health.json.number_of_nodes }}"
          - ""
          - "Secrets distributed to all cluster nodes."
          - "Affected services restarted on master."
