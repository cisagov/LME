services:
  node1:
    build:
      context: ../../
      dockerfile: docker/d12.10/Dockerfile
      target: lme
      args:
        USER_ID: "${HOST_UID:-1000}"
        GROUP_ID: "${HOST_GID:-1000}"
    container_name: lme_d1210_cluster_node1
    hostname: node1
    working_dir: /home/lme-user/LME
    volumes:
      - ../../:/home/lme-user/LME
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - HOST_IP=${HOST_IP}
      - NODE_NAME=node1
      - NODE_ROLE=master
    command: ["/lib/systemd/systemd", "--system"]
    ports:
      - "5601:5601"
      - "443:443"
      - "8220:8220"
      - "9200:9200"
      - "9300:9300"
      - "1514-1515:1514-1515"
      - "55000:55000"
      - "514:514/udp"
      - "1516:1516"
    networks:
      - lme-d1210-cluster-network

  node2:
    build:
      context: ../../
      dockerfile: docker/d12.10/Dockerfile
      target: lme
      args:
        USER_ID: "${HOST_UID:-1000}"
        GROUP_ID: "${HOST_GID:-1000}"
    container_name: lme_d1210_cluster_node2
    hostname: node2
    working_dir: /root/LME
    volumes:
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - HOST_IP=${HOST_IP}
      - NODE_NAME=node2
      - NODE_ROLE=elasticsearch
    command: ["/lib/systemd/systemd", "--system"]
    ports:
      - "9201:9200"
      - "9301:9300"
    networks:
      - lme-d1210-cluster-network

  node3:
    build:
      context: ../../
      dockerfile: docker/d12.10/Dockerfile
      target: lme
      args:
        USER_ID: "${HOST_UID:-1000}"
        GROUP_ID: "${HOST_GID:-1000}"
    container_name: lme_d1210_cluster_node3
    hostname: node3
    working_dir: /root/LME
    volumes:
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - HOST_IP=${HOST_IP}
      - NODE_NAME=node3
      - NODE_ROLE=elasticsearch
    command: ["/lib/systemd/systemd", "--system"]
    ports:
      - "9202:9200"
      - "9302:9300"
    networks:
      - lme-d1210-cluster-network

networks:
  lme-d1210-cluster-network:
    driver: bridge
