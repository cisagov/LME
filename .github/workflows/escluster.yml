name: Elasticsearch Cluster (escluster)

on:
  workflow_dispatch:
    inputs:
      azure_region:
        description: 'Azure region to deploy resources'
        required: true
        default: 'centralus'
        type: choice
        options:
          - centralus
          - eastus
          - eastus2
          - westus
          - westus2
          - westus3
          - northcentralus
          - southcentralus
          - canadacentral
          - canadaeast
          - uksouth
          - ukwest
          - northeurope
          - westeurope
  pull_request:
    branches:
      - 'develop'
      - 'main'

jobs:
  build-and-test-escluster:
    runs-on: self-hosted
    env:
      UNIQUE_ID: ${{ github.run_id }}-${{ github.run_number }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      IP_ADDRESS: ""
      AZURE_IP: ""
      WINDOWS_IP: ""
      MASTER_PRIVATE_IP: ""
      ALL_PRIVATE_IPS_JSON: ""
      ENROLLMENT_TOKEN: ""
      ES_PASSWORD: ""
      KIBANA_PASSWORD: ""
      ELASTIC_AGENT_VERSION: "8.18.8"
      NODE4_PUBLIC_IP: ""
      NODE4_PRIVATE_IP: "10.1.0.12"

    steps:
      - name: Generate random number
        shell: bash
        run: |
          RANDOM_NUM=$(shuf -i 1000000000-9999999999 -n 1)
          echo "UNIQUE_ID=${RANDOM_NUM}_escluster_${{ github.run_number }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment variables
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          echo "IP_ADDRESS=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Get branch name
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BRANCH_NAME=${{ github.head_ref }}" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          fi

      - name: Set the environment for docker-compose
        run: |
          cd testing/v2/development
          echo "HOST_UID=$(id -u)" > .env
          echo "HOST_GID=$(id -g)" >> .env
          cat .env

      - name: Build pipeline container
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} build pipeline --no-cache

      - name: Start pipeline container
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} up -d pipeline

      - name: Install Python requirements
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd /home/lme-user/LME/testing/v2/installers/azure && \
            pip install -r requirements.txt
          "

      - name: Build Azure Ubuntu instances with Windows VM
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T \
            -e AZURE_CLIENT_ID \
            -e AZURE_CLIENT_SECRET \
            -e AZURE_TENANT_ID \
            -e AZURE_SUBSCRIPTION_ID \
            pipeline bash -c "
              cd /home/lme-user/LME/testing/v2/installers && \
              python3 ./azure/build_azure_linux_network.py \
                -g pipe-${{ env.UNIQUE_ID }} \
                -s ${{ env.IP_ADDRESS }}/32 \
                -vs Standard_D8_v4 \
                -l ${{ inputs.azure_region || 'centralus' }} \
                -ast 23:00 \
                -c 3 \
                -w \
                -y
            "

      - name: Extract cluster metadata
        run: |
          cd testing/v2/development
          echo "Waiting for VMs to boot..."
          sleep 120
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"
          MACHINES_FILE="${INSTALLERS_DIR}/pipe-${{ env.UNIQUE_ID }}.machines.json"

          AZURE_IP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c \
            "jq -r '.linux_vms[0].ip_address' ${MACHINES_FILE}" | tr -d '\r\n ')
          echo "AZURE_IP=$AZURE_IP" >> $GITHUB_ENV

          MASTER_PRIVATE_IP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c \
            "jq -r '.linux_vms[0].private_ip' ${MACHINES_FILE}" | tr -d '\r\n ')
          echo "MASTER_PRIVATE_IP=$MASTER_PRIVATE_IP" >> $GITHUB_ENV

          ALL_PRIVATE_IPS_JSON=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c \
            "jq -c '[.linux_vms[].private_ip]' ${MACHINES_FILE}" | tr -d '\r\n ')
          echo "ALL_PRIVATE_IPS_JSON=$ALL_PRIVATE_IPS_JSON" >> $GITHUB_ENV

          WINDOWS_IP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            az network public-ip show --resource-group pipe-${{ env.UNIQUE_ID }} --name ws1-public-ip --query ipAddress --output tsv 2>/dev/null || \
            az vm show --resource-group pipe-${{ env.UNIQUE_ID }} --name ws1 --show-details --query publicIps --output tsv 2>/dev/null || \
            az vm list-ip-addresses --resource-group pipe-${{ env.UNIQUE_ID }} --query '[?virtualMachine.name==\`ws1\`].virtualMachine.network.publicIpAddresses[0].ipAddress' --output tsv 2>/dev/null || \
            echo ''
          " | tr -d '\r\n ')
          if [ -z "$WINDOWS_IP" ]; then
            echo "Warning: Could not retrieve Windows VM public IP, using private IP instead"
            WINDOWS_IP="10.1.0.4"
          fi
          echo "WINDOWS_IP=$WINDOWS_IP" >> $GITHUB_ENV

          echo "Master public IP: $AZURE_IP"
          echo "Master private IP: $MASTER_PRIVATE_IP"
          echo "All private IPs: $ALL_PRIVATE_IPS_JSON"
          echo "Windows IP: $WINDOWS_IP"

      - name: Set up SSH access to all Linux VMs
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            PASSWORD=\$(cat pipe-${{ env.UNIQUE_ID }}.password.txt) && \
            for IP in \$(jq -r '.linux_vms[].ip_address' pipe-${{ env.UNIQUE_ID }}.machines.json); do
              echo \"Waiting for SSH on \$IP...\"
              for i in \$(seq 1 30); do
                if sshpass -p \"\$PASSWORD\" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 lme-user@\$IP 'echo ok' 2>/dev/null; then
                  echo \"SSH ready on \$IP\"
                  break
                fi
                echo -n '.'
                sleep 10
              done
              echo \"Copying SSH key to \$IP...\"
              ./lib/copy_ssh_key.sh lme-user \$IP pipe-${{ env.UNIQUE_ID }}.password.txt
            done
          "

      - name: Set up SSH trust from master to child nodes
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'ssh-keygen -t rsa -b 4096 -N \"\" -f ~/.ssh/id_rsa -q <<< y 2>/dev/null || true'
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'sudo apt-get update -qq && sudo apt-get install -y -qq sshpass'
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            PASSWORD=\$(cat pipe-${{ env.UNIQUE_ID }}.password.txt) && \
            for ip in \$(jq -r '.linux_vms[1:][].private_ip' pipe-${{ env.UNIQUE_ID }}.machines.json); do
              echo \"Copying master SSH key to \$ip...\"
              ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
                \"sshpass -p '\$PASSWORD' ssh-copy-id -o StrictHostKeyChecking=no lme-user@\$ip\"
              echo \"Testing SSH from master to \$ip...\"
              ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
                \"ssh -o StrictHostKeyChecking=no lme-user@\$ip hostname\"
            done
          "

      - name: Clone repo and prepare master for cluster install
        run: |
          cd testing/v2/development

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              git clone https://github.com/cisagov/LME.git ~/LME &&
              cd ~/LME &&
              git fetch --all --tags &&
              if git show-ref --tags --verify --quiet \"refs/tags/${{ env.BRANCH_NAME }}\"; then
                git checkout ${{ env.BRANCH_NAME }}
              else
                git checkout -t origin/${{ env.BRANCH_NAME }} || git checkout ${{ env.BRANCH_NAME }}
              fi
            '
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              cp ~/LME/config/example.env ~/LME/config/lme-environment.env &&
              sed -i \"s/IPVAR=.*/IPVAR=${{ env.MASTER_PRIVATE_IP }}/\" ~/LME/config/lme-environment.env
            '
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              sudo apt-get update && sudo apt-get install -y ansible jq
            '
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              cd ~/LME/ansible && ansible-galaxy collection install -r requirements.yml --timeout 30
            '
          " || echo "Galaxy install failed, continuing with existing collections..."

      - name: Run site.yml in cluster mode on master
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MASTER_PIP=\$(jq -r '.linux_vms[0].private_ip' pipe-${{ env.UNIQUE_ID }}.machines.json) && \
            ALL_IPS=\$(jq -c '[.linux_vms[].private_ip]' pipe-${{ env.UNIQUE_ID }}.machines.json) && \
            jq -n --argjson hosts \"\$ALL_IPS\" --arg master \"\$MASTER_PIP\" \
              '{lme_cluster_mode: true, es_cluster_seed_hosts: \$hosts, es_master_publish_host: \$master}' \
              > /tmp/cluster_vars.json && \
            echo 'Cluster extra vars:' && cat /tmp/cluster_vars.json && \
            scp /tmp/cluster_vars.json lme-user@${{ env.AZURE_IP }}:/tmp/cluster_vars.json
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              cd ~/LME && ansible-playbook ansible/site.yml -e @/tmp/cluster_vars.json
            '
          "

      - name: Create cluster inventory and deploy to child nodes
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            MASTER_PIP=\$(jq -r '.linux_vms[0].private_ip' \$MACHINES_FILE) && \
            MASTER_PUB=\$(jq -r '.linux_vms[0].ip_address' \$MACHINES_FILE) && \
            TMPFILE=\$(mktemp) && \
            echo 'all:' > \$TMPFILE && \
            echo '  vars:' >> \$TMPFILE && \
            echo \"    es_master_host: \${MASTER_PIP}\" >> \$TMPFILE && \
            echo '    es_cluster_seed_hosts:' >> \$TMPFILE && \
            for ip in \$(jq -r '.linux_vms[].private_ip' \$MACHINES_FILE); do
              echo \"      - \${ip}\" >> \$TMPFILE
            done && \
            echo '  children:' >> \$TMPFILE && \
            echo '    elasticsearch:' >> \$TMPFILE && \
            echo '      hosts:' >> \$TMPFILE && \
            echo '        es1:' >> \$TMPFILE && \
            echo \"          ansible_host: \${MASTER_PIP}\" >> \$TMPFILE && \
            echo '          ansible_connection: local' >> \$TMPFILE && \
            echo '          es_node_name: lme-elasticsearch' >> \$TMPFILE && \
            echo '          es_is_initial_master: true' >> \$TMPFILE && \
            echo \"          es_publish_host: \${MASTER_PIP}\" >> \$TMPFILE && \
            i=2 && \
            for ip in \$(jq -r '.linux_vms[1:][].private_ip' \$MACHINES_FILE); do
              echo \"        es\${i}:\" >> \$TMPFILE && \
              echo \"          ansible_host: \${ip}\" >> \$TMPFILE && \
              echo '          ansible_user: lme-user' >> \$TMPFILE && \
              echo \"          es_node_name: es\${i}\" >> \$TMPFILE && \
              echo \"          es_publish_host: \${ip}\" >> \$TMPFILE
              i=\$((i + 1))
            done && \
            echo 'Generated cluster inventory:' && cat \$TMPFILE && \
            scp \$TMPFILE lme-user@\${MASTER_PUB}:~/LME/ansible/inventory/cluster.yml && \
            rm \$TMPFILE
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              cd ~/LME && ansible-playbook -i ansible/inventory/cluster.yml ansible/elasticsearch.yml
            '
          "

      - name: Verify cluster health
        run: |
          cd testing/v2/development
          echo "Waiting for cluster to stabilize..."
          sleep 120
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} 'sudo bash -c \"\
              source /opt/lme/scripts/extract_secrets.sh -q && \
              echo === Cluster Health === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cluster/health?pretty && \
              echo === Cluster Nodes === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cat/nodes?v\"'
          "

      - name: Set up NFS server on master
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            MASTER_PIP=\$(jq -r '.linux_vms[0].private_ip' \$MACHINES_FILE) && \
            NFS_EXPORTS='/srv/es-snapshots' && \
            for ip in \$(jq -r '.linux_vms[].private_ip' \$MACHINES_FILE); do
              NFS_EXPORTS=\"\${NFS_EXPORTS} \${ip}(rw,sync,no_subtree_check,no_root_squash)\"
            done && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              \"sudo apt-get install -y nfs-kernel-server && \
               sudo mkdir -p /srv/es-snapshots && sudo chmod 777 /srv/es-snapshots && \
               echo '\${NFS_EXPORTS}' | sudo tee /etc/exports && \
               sudo exportfs -ra && sudo systemctl start nfs-kernel-server\"
          "

      - name: Mount NFS on all nodes
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            MASTER_PIP=\$(jq -r '.linux_vms[0].private_ip' \$MACHINES_FILE) && \
            for pub_ip in \$(jq -r '.linux_vms[].ip_address' \$MACHINES_FILE); do
              echo \"=== Mounting NFS on \${pub_ip} ===\" && \
              ssh -o StrictHostKeyChecking=no lme-user@\${pub_ip} \
                \"sudo apt-get install -y nfs-common && \
                 sudo mkdir -p /mnt/es-snapshots && \
                 sudo mount -t nfs \${MASTER_PIP}:/srv/es-snapshots /mnt/es-snapshots && \
                 grep -q /mnt/es-snapshots /etc/fstab || echo '\${MASTER_PIP}:/srv/es-snapshots /mnt/es-snapshots nfs defaults 0 0' | sudo tee -a /etc/fstab\"
            done
          "

      - name: Configure Elasticsearch NFS snapshot path on all nodes
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            for pub_ip in \$(jq -r '.linux_vms[].ip_address' \$MACHINES_FILE); do
              echo \"=== Configuring ES on \${pub_ip} ===\" && \
              ssh -o StrictHostKeyChecking=no lme-user@\${pub_ip} '
                sudo grep -q /usr/share/elasticsearch/snapshots /opt/lme/config/elasticsearch.yml || \
                  sudo sed -i \"/\\/usr\\/share\\/elasticsearch\\/backups/a\\\\    - /usr/share/elasticsearch/snapshots\" /opt/lme/config/elasticsearch.yml
                sudo mkdir -p /etc/containers/systemd/lme-elasticsearch.container.d/
                echo \"[Container]
          Volume=/mnt/es-snapshots:/usr/share/elasticsearch/snapshots\" | sudo tee /etc/containers/systemd/lme-elasticsearch.container.d/nfs-mount.conf
                sudo systemctl daemon-reload && sudo systemctl restart lme-elasticsearch
              '
            done
          "

      - name: Verify NFS and cluster health after restart
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"
          echo "Waiting for Elasticsearch to restart on all nodes..."
          sleep 60

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            echo '=== Creating test file on master NFS export ===' && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'sudo touch /srv/es-snapshots/nfs_test_file' && \
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            for pub_ip in \$(jq -r '.linux_vms[1:][].ip_address' \$MACHINES_FILE); do
              echo \"=== Checking NFS on \${pub_ip} ===\" && \
              ssh -o StrictHostKeyChecking=no lme-user@\${pub_ip} \
                'df -h /mnt/es-snapshots && ls -la /mnt/es-snapshots/nfs_test_file'
            done && \
            echo '=== Cleaning up test file ===' && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'sudo rm /srv/es-snapshots/nfs_test_file'
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} 'sudo bash -c \"\
              source /opt/lme/scripts/extract_secrets.sh -q && \
              echo === Cluster Health After NFS === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cluster/health?pretty && \
              echo === Cluster Nodes After NFS === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cat/nodes?v\"'
          "

      - name: Retrieve Elastic password
        env:
          AZURE_IP: ${{ env.AZURE_IP }}
        run: |
          cd testing/v2/development
          ES_PASSWORD=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "ssh lme-user@$AZURE_IP '. /home/lme-user/LME/scripts/extract_secrets.sh -q && echo \$elastic'" | tail -n 1 | tr -d '\n')
          echo "::add-mask::$ES_PASSWORD"
          echo "ES_PASSWORD=$ES_PASSWORD" >> $GITHUB_ENV
          echo "Elastic password retrieved successfully: $ES_PASSWORD"
          KIBANA_PASSWORD=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "ssh lme-user@$AZURE_IP '. /home/lme-user/LME/scripts/extract_secrets.sh -q && echo \$kibana_system'" | tail -n 1 | tr -d '\n')
          echo "::add-mask::$KIBANA_PASSWORD"
          echo "KIBANA_PASSWORD=$KIBANA_PASSWORD" >> $GITHUB_ENV
          echo "Kibana password retrieved successfully: $KIBANA_PASSWORD"

      - name: Install test requirements on master node
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} 'whoami && hostname && \
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
            sudo apt install -y ./google-chrome-stable_current_amd64.deb && \
            cd /home/lme-user/LME/testing/tests && \
            python3 -m venv venv && \
            source venv/bin/activate && \
            pip install -r requirements.txt '
          "

      - name: Retrieve Elastic policy ID and enrollment token
        env:
          KIBANA_URL: "https://localhost:5601"
          ES_USERNAME: "elastic"
          ES_PASSWORD: ${{ env.ES_PASSWORD }}
        run: |
          cd testing/v2/development
          POLICY_ID_TEST=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} '
              curl -kL -s -u \"$ES_USERNAME:$ES_PASSWORD\" -X GET \"$KIBANA_URL/api/fleet/agent_policies\" \
                -H \"kbn-xsrf: true\" \
                -H \"Content-Type: application/json\"  
            '
          ")
          echo "Retrieved Policy ID test: $POLICY_ID_TEST"

          POLICY_ID=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} '
              curl -kL -s -u \"$ES_USERNAME:$ES_PASSWORD\" -X GET \"$KIBANA_URL/api/fleet/agent_policies\" \
                -H \"kbn-xsrf: true\" \
                -H \"Content-Type: application/json\" |
              jq -r '.items[0].id'
            '
          ")
          echo "Retrieved Policy ID: $POLICY_ID"

          ENROLLMENT_TOKEN=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} '
              curl -kL -s -u \"$ES_USERNAME:$ES_PASSWORD\" -X POST \"$KIBANA_URL/api/fleet/enrollment-api-keys\" \
                -H \"kbn-xsrf: true\" \
                -H \"Content-Type: application/json\" \
                -d \"{\\\"policy_id\\\":\\\"$POLICY_ID\\\"}\" |
              jq -r .item.api_key
            '
          ")
          echo "Retrieved enrollment token: $ENROLLMENT_TOKEN"

          echo "::add-mask::$ENROLLMENT_TOKEN"
          echo "ENROLLMENT_TOKEN=$ENROLLMENT_TOKEN" >> $GITHUB_ENV
          echo "Policy ID and Enrollment Token retrieved successfully"

      - name: Install the Elastic Agent on Windows Azure VM
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T \
            -e AZURE_CLIENT_ID \
            -e AZURE_CLIENT_SECRET \
            -e AZURE_TENANT_ID \
            -e AZURE_SUBSCRIPTION_ID \
            pipeline bash -c "
              az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID && \
              cd /home/lme-user/LME/testing/v2/installers/lib/ && \
              chmod +x install_agent_windows_azure.sh && \
              ./install_agent_windows_azure.sh \
                --resource-group pipe-${{ env.UNIQUE_ID }} \
                --vm-name ws1 \
                --token ${{ env.ENROLLMENT_TOKEN }} \
                --version ${{ env.ELASTIC_AGENT_VERSION }} \
                --debug
            "

      - name: Check if the Windows Elastic agent is reporting
        env:
          ES_PASSWORD: ${{ env.ES_PASSWORD }}
        run: |
          sleep 360
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
              ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'export ES_PASSWORD=\"$ES_PASSWORD\" && /home/lme-user/LME/testing/v2/installers/lib/check_agent_reporting.sh windows'
          "

      - name: Wait 5 minutes after Windows agent check
        run: |
          sleep 300

      - name: Run api tests on master node
        env:
          ES_PASSWORD: ${{ env.ES_PASSWORD }}
          KIBANA_PASSWORD: ${{ env.KIBANA_PASSWORD }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} 'cd /home/lme-user/LME/testing/tests && \
            echo ELASTIC_PASSWORD=\"$ES_PASSWORD\" >> .env && \
            echo KIBANA_PASSWORD=\"$KIBANA_PASSWORD\" >> .env && \
            echo elastic=\"$ES_PASSWORD\" >> .env && \
            source venv/bin/activate && \
            pytest -v api_tests/'
          "

      - name: Run selenium tests on master node
        env:
          ES_PASSWORD: ${{ env.ES_PASSWORD }}
          KIBANA_PASSWORD: ${{ env.KIBANA_PASSWORD }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh lme-user@${{ env.AZURE_IP }} 'cd /home/lme-user/LME/testing/tests && \
            echo ELASTIC_PASSWORD=\"$ES_PASSWORD\" >> .env && \
            echo KIBANA_PASSWORD=\"$KIBANA_PASSWORD\" >> .env && \
            echo elastic=\"$ES_PASSWORD\" >> .env && \
            source venv/bin/activate && \
            pytest -v selenium_tests/'
          "

      # =========================================================================
      # Node Recovery Test: Replace failed node 3 with new node 4
      # =========================================================================

      - name: "Recovery: Create spare VM (ubuntu-4)"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T \
            -e AZURE_CLIENT_ID \
            -e AZURE_CLIENT_SECRET \
            -e AZURE_TENANT_ID \
            -e AZURE_SUBSCRIPTION_ID \
            pipeline bash -c "
              az login --service-principal -u \$AZURE_CLIENT_ID -p \$AZURE_CLIENT_SECRET --tenant \$AZURE_TENANT_ID && \
              az vm create \
                --resource-group pipe-${{ env.UNIQUE_ID }} \
                --name ubuntu-4 \
                --image 'Canonical:ubuntu-24_04-lts:server:latest' \
                --size Standard_E2d_v4 \
                --admin-username lme-user \
                --admin-password \$(cat ${INSTALLERS_DIR}/pipe-${{ env.UNIQUE_ID }}.password.txt) \
                --vnet-name VNet1 \
                --subnet SNet1 \
                --private-ip-address ${{ env.NODE4_PRIVATE_IP }} \
                --nsg NSG1 \
                --public-ip-sku Standard \
                --os-disk-size-gb 128 \
                --output json
            "

          NODE4_PUBLIC_IP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T \
            -e AZURE_CLIENT_ID \
            -e AZURE_CLIENT_SECRET \
            -e AZURE_TENANT_ID \
            -e AZURE_SUBSCRIPTION_ID \
            pipeline bash -c "
              az vm list-ip-addresses \
                --resource-group pipe-${{ env.UNIQUE_ID }} \
                --name ubuntu-4 \
                --query '[0].virtualMachine.network.publicIpAddresses[0].ipAddress' -o tsv
            " | tr -d '\r\n ')
          echo "NODE4_PUBLIC_IP=$NODE4_PUBLIC_IP" >> $GITHUB_ENV
          echo "Node 4 public IP: $NODE4_PUBLIC_IP, private IP: ${{ env.NODE4_PRIVATE_IP }}"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            PASSWORD=\$(cat pipe-${{ env.UNIQUE_ID }}.password.txt) && \
            jq --arg pub '${NODE4_PUBLIC_IP}' --arg priv '${{ env.NODE4_PRIVATE_IP }}' \
              --arg user 'lme-user' --arg pw \"\$PASSWORD\" \
              '.linux_vms += [{\"vm_name\":\"ubuntu-4\",\"ip_address\":\$pub,\"private_ip\":\$priv,\"username\":\$user,\"password\":\$pw}]' \
              \$MACHINES_FILE > /tmp/machines_updated.json && \
            mv /tmp/machines_updated.json \$MACHINES_FILE && \
            echo 'Updated machines.json:' && cat \$MACHINES_FILE
          "

      - name: "Recovery: Set up SSH to spare node"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            PASSWORD=\$(cat pipe-${{ env.UNIQUE_ID }}.password.txt) && \
            echo 'Waiting for SSH on ${{ env.NODE4_PUBLIC_IP }}...' && \
            for i in \$(seq 1 30); do
              if sshpass -p \"\$PASSWORD\" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 lme-user@${{ env.NODE4_PUBLIC_IP }} 'echo ok' 2>/dev/null; then
                echo 'SSH ready'
                break
              fi
              echo -n '.'
              sleep 10
            done && \
            ./lib/copy_ssh_key.sh lme-user ${{ env.NODE4_PUBLIC_IP }} pipe-${{ env.UNIQUE_ID }}.password.txt
          "

      - name: "Recovery: Deallocate node 3 (simulate failure)"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T \
            -e AZURE_CLIENT_ID \
            -e AZURE_CLIENT_SECRET \
            -e AZURE_TENANT_ID \
            -e AZURE_SUBSCRIPTION_ID \
            pipeline bash -c "
              az login --service-principal -u \$AZURE_CLIENT_ID -p \$AZURE_CLIENT_SECRET --tenant \$AZURE_TENANT_ID && \
              az vm deallocate --resource-group pipe-${{ env.UNIQUE_ID }} --name ubuntu-3 --no-wait && \
              echo 'Waiting for ubuntu-3 to deallocate...' && \
              while true; do
                STATE=\$(az vm show --resource-group pipe-${{ env.UNIQUE_ID }} --name ubuntu-3 -d --query 'powerState' -o tsv 2>/dev/null)
                echo \"Power state: \$STATE\"
                echo \"\$STATE\" | grep -q deallocated && break
                sleep 10
              done && \
              echo 'ubuntu-3 is deallocated'
            "

      - name: "Recovery: Observe degraded cluster state"
        run: |
          cd testing/v2/development
          echo "Waiting for cluster to detect missing node..."
          sleep 60
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} 'sudo bash -c \"\
              source /opt/lme/scripts/extract_secrets.sh -q && \
              echo === Cluster Health === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cluster/health?pretty && \
              echo === Node Membership === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cat/nodes?v\"'
          "

      - name: "Recovery: Set up SSH from master to node 4"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            PASSWORD=\$(cat pipe-${{ env.UNIQUE_ID }}.password.txt) && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              \"sshpass -p '\$PASSWORD' ssh-copy-id -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PRIVATE_IP }}\" && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              \"ssh -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PRIVATE_IP }} hostname\"
          "

      - name: "Recovery: Update inventory (replace es3 with es4)"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          MASTER_PIP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c \
            "jq -r '.linux_vms[0].private_ip' ${INSTALLERS_DIR}/pipe-${{ env.UNIQUE_ID }}.machines.json" | tr -d '\r\n ')
          ES2_PIP=$(docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c \
            "jq -r '.linux_vms[1].private_ip' ${INSTALLERS_DIR}/pipe-${{ env.UNIQUE_ID }}.machines.json" | tr -d '\r\n ')

          cat > recovery_inventory.yml << EOF
          all:
            vars:
              es_master_host: ${MASTER_PIP}
              es_cluster_seed_hosts:
                - ${MASTER_PIP}
                - ${ES2_PIP}
                - ${{ env.NODE4_PRIVATE_IP }}
            children:
              elasticsearch:
                hosts:
                  es1:
                    ansible_host: ${MASTER_PIP}
                    ansible_connection: local
                    es_node_name: lme-elasticsearch
                    es_is_initial_master: true
                    es_publish_host: ${MASTER_PIP}
                  es2:
                    ansible_host: ${ES2_PIP}
                    ansible_user: lme-user
                    es_node_name: es2
                    es_publish_host: ${ES2_PIP}
                  es4:
                    ansible_host: ${{ env.NODE4_PRIVATE_IP }}
                    ansible_user: lme-user
                    es_node_name: es4
                    es_publish_host: ${{ env.NODE4_PRIVATE_IP }}
          EOF
          echo "=== New inventory ==="
          cat recovery_inventory.yml

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            scp /home/lme-user/LME/testing/v2/development/recovery_inventory.yml \
              lme-user@${{ env.AZURE_IP }}:~/LME/ansible/inventory/cluster.yml
          "
          rm recovery_inventory.yml

      - name: "Recovery: Run Ansible to join node 4"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} '
              cd ~/LME && ansible-playbook -i ansible/inventory/cluster.yml ansible/elasticsearch.yml
            '
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              'sudo systemctl restart lme-elasticsearch'
          "
          sleep 10

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            ES2_PUB=\$(jq -r '.linux_vms[1].ip_address' pipe-${{ env.UNIQUE_ID }}.machines.json) && \
            ssh -o StrictHostKeyChecking=no lme-user@\${ES2_PUB} \
              'sudo systemctl restart lme-elasticsearch'
          "
          sleep 10

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PUBLIC_IP }} \
              'sudo systemctl is-active lme-elasticsearch'
          "

      - name: "Recovery: Set up NFS on node 4 and re-apply NFS config on all nodes"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"

          # Update NFS exports to include node 4
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            MASTER_PIP=\$(jq -r '.linux_vms[0].private_ip' \$MACHINES_FILE) && \
            ES2_PIP=\$(jq -r '.linux_vms[1].private_ip' \$MACHINES_FILE) && \
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} \
              \"sudo sed -i '/^\\/srv\\/es-snapshots/d' /etc/exports && \
               echo '/srv/es-snapshots \${MASTER_PIP}(rw,sync,no_subtree_check,no_root_squash) \${ES2_PIP}(rw,sync,no_subtree_check,no_root_squash) ${{ env.NODE4_PRIVATE_IP }}(rw,sync,no_subtree_check,no_root_squash)' | sudo tee -a /etc/exports && \
               sudo exportfs -ra\"
          "

          # Mount NFS on node 4
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PUBLIC_IP }} \
              \"sudo apt-get install -y nfs-common && \
               sudo mkdir -p /mnt/es-snapshots && \
               sudo mount -t nfs ${{ env.MASTER_PRIVATE_IP }}:/srv/es-snapshots /mnt/es-snapshots && \
               grep -q /mnt/es-snapshots /etc/fstab || echo '${{ env.MASTER_PRIVATE_IP }}:/srv/es-snapshots /mnt/es-snapshots nfs defaults 0 0' | sudo tee -a /etc/fstab\"
          "

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PUBLIC_IP }} \
              'mountpoint -q /mnt/es-snapshots && echo NFS mounted || echo NFS NOT mounted'
          "

          # Re-apply path.repo + quadlet drop-in on ALL nodes (ansible overwrote config on es1/es2)
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            MACHINES_FILE=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            for pub_ip in \$(jq -r '.linux_vms[] | select(.vm_name != \"ubuntu-3\") | .ip_address' \$MACHINES_FILE); do
              echo \"=== Re-applying ES NFS config on \${pub_ip} ===\" && \
              ssh -o StrictHostKeyChecking=no lme-user@\${pub_ip} '
                sudo grep -q /usr/share/elasticsearch/snapshots /opt/lme/config/elasticsearch.yml || \
                  sudo sed -i \"/\\/usr\\/share\\/elasticsearch\\/backups/a\\\\    - /usr/share/elasticsearch/snapshots\" /opt/lme/config/elasticsearch.yml
                sudo mkdir -p /etc/containers/systemd/lme-elasticsearch.container.d/
                echo \"[Container]
          Volume=/mnt/es-snapshots:/usr/share/elasticsearch/snapshots\" | sudo tee /etc/containers/systemd/lme-elasticsearch.container.d/nfs-mount.conf
                sudo systemctl daemon-reload && sudo systemctl restart lme-elasticsearch
              '
            done
          "

          # Verify node 4 ES is running
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.NODE4_PUBLIC_IP }} \
              'sudo systemctl is-active lme-elasticsearch'
          "

      - name: "Recovery: Validate cluster recovery"
        run: |
          cd testing/v2/development
          echo "Waiting for shard rebalancing..."
          sleep 120
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            ssh -o StrictHostKeyChecking=no lme-user@${{ env.AZURE_IP }} 'sudo bash -c \"\
              source /opt/lme/scripts/extract_secrets.sh -q && \
              echo === Cluster Health === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cluster/health?pretty && \
              echo === Node Membership === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cat/nodes?v && \
              echo === Shard Distribution === && \
              curl -sk -u \\\"elastic:\\\$elastic\\\" https://localhost:9200/_cat/shards?v\"'
          "

      # =========================================================================
      # Post-Recovery Tests: Snapshot & Password Change
      # =========================================================================

      - name: "Post-recovery: Prepare test artifacts"
        run: |
          cd testing/v2/development
          INSTALLERS_DIR="/home/lme-user/LME/testing/v2/installers"
          RG="pipe-${{ env.UNIQUE_ID }}-postrecovery"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd ${INSTALLERS_DIR} && \
            ORIG=pipe-${{ env.UNIQUE_ID }}.machines.json && \
            jq '[.linux_vms[] | select(.vm_name != \"ubuntu-3\")]' \$ORIG \
              | jq '{linux_vms: .}' > ${RG}.machines.json && \
            cp pipe-${{ env.UNIQUE_ID }}.password.txt ${RG}.password.txt && \
            printf 'RESOURCE_GROUP=%s\nLME_USER=lme-user\n' '${RG}' > exporter.txt && \
            echo '=== Post-recovery machines.json ===' && \
            jq '.linux_vms[].vm_name' ${RG}.machines.json && \
            echo '=== exporter.txt ===' && \
            cat exporter.txt
          "

      - name: "Post-recovery: Run snapshot tests"
        run: |
          cd testing/v2/development
          RG="pipe-${{ env.UNIQUE_ID }}-postrecovery"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd /home/lme-user/LME/testing/v2/installers/cluster_installer && \
            ./test_snapshot.sh -r ${RG}
          "

      - name: "Post-recovery: Run Ansible password-change tests"
        run: |
          cd testing/v2/development
          RG="pipe-${{ env.UNIQUE_ID }}-postrecovery"

          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            cd /home/lme-user/LME/testing/v2/installers/cluster_installer && \
            ./test_change_passwords.sh --ansible-only -r ${RG}
          "

      - name: Cleanup Azure resources
        if: always()
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SECRET: ${{ secrets.AZURE_SECRET }}
          AZURE_TENANT: ${{ secrets.AZURE_TENANT }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} exec -T pipeline bash -c "
            az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_SECRET --tenant $AZURE_TENANT
            az group delete --name pipe-${{ env.UNIQUE_ID }} --yes --no-wait
          "

      - name: Stop and remove containers
        if: always()
        run: |
          cd testing/v2/development
          docker compose -p ${{ env.UNIQUE_ID }} down
          docker system prune -af
