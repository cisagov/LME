services:
  node1:
    build:
      context: ../../../
      dockerfile: testing/v2/development/Dockerfile
      target: ubuntu
      args:
        USER_ID: "${HOST_UID:-1001}"
        GROUP_ID: "${HOST_GID:-1001}"
    container_name: lme_cluster_node1
    hostname: node1
    working_dir: /home/lme-user/LME
    volumes:
      - ../../../../LME:/home/lme-user/LME
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - NODE_NAME=node1
      - NODE_ROLE=master
    command: ["/lib/systemd/systemd", "--system"]
    ports:
      - "5601:5601"
      - "443:443"
      - "8220:8220"
      - "9200:9200"
      - "9300:9300"
      - "1514-1515:1514-1515"
      - "55000:55000"
      - "514:514/udp"
      - "1516:1516"
    networks:
      - lme-cluster-network

  node2:
    build:
      context: ../../../
      dockerfile: testing/v2/development/Dockerfile
      target: ubuntu
      args:
        USER_ID: "${HOST_UID:-1001}"
        GROUP_ID: "${HOST_GID:-1001}"
    container_name: lme_cluster_node2
    hostname: node2
    working_dir: /root/LME
    volumes:
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - NODE_NAME=node2
      - NODE_ROLE=elasticsearch
    command: ["/lib/systemd/systemd", "--system"]
    # Only expose Elasticsearch ports on child nodes (offset to avoid conflicts)
    ports:
      - "9201:9200"
      - "9301:9300"
    networks:
      - lme-cluster-network

  node3:
    build:
      context: ../../../
      dockerfile: testing/v2/development/Dockerfile
      target: ubuntu
      args:
        USER_ID: "${HOST_UID:-1001}"
        GROUP_ID: "${HOST_GID:-1001}"
    container_name: lme_cluster_node3
    hostname: node3
    working_dir: /root/LME
    volumes:
      - /sys/fs/cgroup/systemd:/sys/fs/cgroup/systemd:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    environment:
      - PODMAN_IGNORE_CGROUPSV1_WARNING=1
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - NODE_NAME=node3
      - NODE_ROLE=elasticsearch
    command: ["/lib/systemd/systemd", "--system"]
    # Only expose Elasticsearch ports on child nodes (offset to avoid conflicts)
    ports:
      - "9202:9200"
      - "9302:9300"
    networks:
      - lme-cluster-network

  nfs:
    build:
      context: ../../../
      dockerfile: testing/v2/development/Dockerfile
      target: ubuntu
      args:
        USER_ID: "${HOST_UID:-1001}"
        GROUP_ID: "${HOST_GID:-1001}"
    container_name: lme_cluster_nfs
    hostname: nfs
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    privileged: true
    user: root
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    volumes:
      - nfs-export:/srv/es-snapshots
    environment:
      - LANG=en_US.UTF-8
      - LANGUAGE=en_US:en
      - LC_ALL=en_US.UTF-8
      - container=docker
      - NODE_NAME=nfs
      - NODE_ROLE=nfs
    command: ["/lib/systemd/systemd", "--system"]
    networks:
      - lme-cluster-network

volumes:
  nfs-export:

networks:
  lme-cluster-network:
    driver: bridge

